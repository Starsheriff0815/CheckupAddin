name: Build and Release

# Triggers when you push a version tag, e.g.: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create GitHub Releases and upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out source code
        uses: actions/checkout@v4

      # ── Setup ──────────────────────────────────────────────────────────────────

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2

      # ── 2026 Build ─────────────────────────────────────────────────────────────

      - name: Restore NuGet packages (2026)
        run: nuget restore CheckupAddin2026\CheckupAddin2026.sln

      - name: Build CheckupAddin2026 (Release x64)
        shell: pwsh
        run: msbuild CheckupAddin2026\CheckupAddin2026\CheckupAddin2026.csproj /p:Configuration=Release /p:Platform=x64 /p:WarningLevel=0

      # ── 2026 Package ───────────────────────────────────────────────────────────

      - name: Package CheckupAddin2026
        shell: pwsh
        run: |
          $bin = "CheckupAddin2026\CheckupAddin2026\bin"
          $pkg = "release_2026"
          New-Item -ItemType Directory $pkg | Out-Null

          # Core DLL files
          Copy-Item "$bin\CheckupAddIn.dll"                  $pkg
          Copy-Item "$bin\CheckupAddIn.comhost.dll"          $pkg
          Copy-Item "$bin\CheckupAddIn.runtimeconfig.json"   $pkg

          # Manifest template
          Copy-Item "CheckupAddin2026\CheckupAddin2026\Autodesk.CheckupAddIn2026.addin.template" $pkg

          # Language files
          New-Item -ItemType Directory "$pkg\Languages" | Out-Null
          Copy-Item "$bin\Languages\*" "$pkg\Languages\" -Recurse

          # Seed data (shipped with the build)
          if (Test-Path "$bin\Catalogs")     { New-Item -ItemType Directory "$pkg\Catalogs"     | Out-Null; Copy-Item "$bin\Catalogs\*"     "$pkg\Catalogs\"     -Recurse }
          if (Test-Path "$bin\Capabilities") { New-Item -ItemType Directory "$pkg\Capabilities" | Out-Null; Copy-Item "$bin\Capabilities\*" "$pkg\Capabilities\" -Recurse }

          Compress-Archive -Path "$pkg\*" -DestinationPath "CheckupAddin2026_${{ github.ref_name }}.zip"

      # ── 2024 Build ─────────────────────────────────────────────────────────────

      - name: Restore NuGet packages (2024)
        run: nuget restore CheckupAddin2024\CheckupAddin2024.sln

      - name: Build CheckupAddin2024 (Release x64)
        shell: pwsh
        run: msbuild CheckupAddin2024\CheckupAddin2024\CheckupAddin2024.csproj /p:Configuration=Release /p:Platform=x64 /p:WarningLevel=0

      # ── 2024 Package ───────────────────────────────────────────────────────────

      - name: Package CheckupAddin2024
        shell: pwsh
        run: |
          $bin = "CheckupAddin2024\CheckupAddin2024\bin"
          $pkg = "release_2024"
          New-Item -ItemType Directory $pkg | Out-Null

          # Core DLL file
          Copy-Item "$bin\CheckupAddIn2024.dll" $pkg

          # Manifest template
          Copy-Item "CheckupAddin2024\CheckupAddin2024\Autodesk.CheckupAddIn2024.addin.template" $pkg

          # Language files
          New-Item -ItemType Directory "$pkg\Languages" | Out-Null
          Copy-Item "$bin\Languages\*" "$pkg\Languages\" -Recurse

          # Seed data
          if (Test-Path "$bin\Catalogs")     { New-Item -ItemType Directory "$pkg\Catalogs"     | Out-Null; Copy-Item "$bin\Catalogs\*"     "$pkg\Catalogs\"     -Recurse }
          if (Test-Path "$bin\Capabilities") { New-Item -ItemType Directory "$pkg\Capabilities" | Out-Null; Copy-Item "$bin\Capabilities\*" "$pkg\Capabilities\" -Recurse }

          Compress-Archive -Path "$pkg\*" -DestinationPath "CheckupAddin2024_${{ github.ref_name }}.zip"

      # ── Create GitHub Release ──────────────────────────────────────────────────

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CheckupAddin2026_${{ github.ref_name }}.zip
            CheckupAddin2024_${{ github.ref_name }}.zip
          generate_release_notes: true
